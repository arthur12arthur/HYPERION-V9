lonab:
  url: "https://www.lonab.bf"
  fallback_urls:
    - "https://lonab.bf"
    - "https://api.lonab.bf"
  programme_path: "/programme"
  confiance: 1.0
  scraping_method: "html_first"   # html_first | pdf | gemini
  timeout_seconds: 20
  retry_max: 3

pmu:
  url: "https://www.pmu.fr"
  fallback_urls:
    - "https://pmu.fr"
    - "https://api.pmu.fr"
    - "https://rest.pmu.fr"
  partants_path: "/turf/{date}/{hippodrome}/{course_id}/partants"
  resultats_path: "/turf/{date}/resultats"
  confiance: 1.0
  timeout_seconds: 20
  retry_max: 3

sources_externes:
  - nom: "Paris-Turf"
    url: "https://www.paris-turf.com"
    fallback_urls:
      - "https://paris-turf.com"
    pronostic_path: "/pronostic/{date}"
    confiance: 0.85
    type: "web"
    timeout_seconds: 15

  - nom: "Equidia"
    url: "https://www.equidia.fr"
    fallback_urls:
      - "https://equidia.fr"
    pronostic_path: "/courses/{date}"
    confiance: 0.80
    type: "web"
    timeout_seconds: 15

  - nom: "Zone-Turf"
    url: "https://www.zone-turf.com"
    fallback_urls:
      - "https://zone-turf.com"
    pronostic_path: "/pronostic/{date}"
    confiance: 0.65
    type: "web"
    timeout_seconds: 15

resultats_backup:
  - "https://www.equidia.fr/resultats/{date}"
  - "https://equidia.fr/resultats/{date}"
  - "https://www.paris-turf.com/resultats/{date}"
  - "https://paris-turf.com/resultats/{date}"

scraping:
  timeout_seconds: 15
  user_agent: "Mozilla/5.0 (compatible; HYPERION/9.4)"
  retry_max: 2
  delay_between_requests: 1.5
  retry_delays: [2, 5, 10]  # délais exponentiels en secondes
  fallback_delay: 30  # attendre 30s avant de basculer sur fallback
