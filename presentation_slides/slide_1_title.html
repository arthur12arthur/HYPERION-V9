<!DOCTYPE html>
<html lang="fr">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        /* Remove default body margin and shift up slightly to ensure total page height < 720px */
        body { margin: -1px 0 0 0; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #0B0E14;
            color: #E0E6ED;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #0056B3 0%, #0B0E14 70%);
        }
        .tech-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        /* Shrink inner padding to reduce content height without changing fonts */
        .content-box {
            text-align: center;
            z-index: 10;
            border: 2px solid #00F2FF;
            padding: 40px; /* reduced from 60px */
            background: rgba(11, 14, 20, 0.8);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 64px;
            color: #00F2FF;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        h2 {
            font-size: 32px;
            color: #E0E6ED;
            font-weight: 400;
        }
        .icon-row {
            margin-top: 24px; /* slightly reduced */
            display: flex;
            gap: 20px;
            font-size: 24px;
            color: #0056B3;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="tech-pattern"></div>
        <div class="content-box">
            <h1>HYPERION AI STUDIO V9.4</h1>
            <h2>L'Excellence de l'Analyse Hippique par l'IA</h2>
            <div class="icon-row">
                <i class="fas fa-microchip"></i>
                <i class="fas fa-chart-line"></i>
                <i class="fas fa-shield-halved"></i>
                <i class="fas fa-network-wired"></i>
            </div>
        </div>
    </div>
</body>
</html>
